# golangci-lint configuration. Runs in CI as the first static-analysis gate
# before SonarCloud. Mirrors the project's Go style rules.
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic
    - bodyclose

issues:
  exclude-rules:
    # Test files may skip a few strict checks for readability.
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
  max-issues-per-linter: 0
  max-same-issues: 0
