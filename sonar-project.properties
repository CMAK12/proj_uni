# SonarCloud configuration for CourseHub.
#
# TODO: replace the two placeholders below with your real SonarCloud values
#       (Project key and Organization, visible on your SonarCloud project page).
sonar.projectKey=cmak12
sonar.organization=Dmytro

# SonarCloud host. For a self-hosted SonarQube server change this URL.
sonar.host.url=https://sonarcloud.io

sonar.projectName=CourseHub
sonar.sourceEncoding=UTF-8

# Sources vs tests. Everything is Go; test files end in _test.go.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go,**/testdata/**,internal/httpapi/templates/**

# Keep main() (composition root / wiring, not unit-testable) out of coverage math
# so the Quality Gate reflects testable business logic.
sonar.coverage.exclusions=cmd/server/main.go

# Reports produced by the CI test step.
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=report.json
